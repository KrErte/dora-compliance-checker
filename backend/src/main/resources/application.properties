server.port=8080

# PostgreSQL Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/doradb}
spring.datasource.username=${DATABASE_USERNAME:dora}
spring.datasource.password=${DATABASE_PASSWORD:dora_secret}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Multipart file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Anthropic API (regulatory compliance engine)
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.model=${ANTHROPIC_API_MODEL:claude-sonnet-4-20250514}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:80}
