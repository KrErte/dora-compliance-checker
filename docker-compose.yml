services:
  postgres:
    image: postgres:16-alpine
    container_name: dora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: doradb
      POSTGRES_USER: dora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dora_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dora -d doradb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: dora-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=jdbc:postgresql://postgres:5432/doradb
      - DATABASE_USERNAME=dora
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-dora_secret}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: dora-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: dora-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
